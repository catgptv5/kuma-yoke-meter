name: Update bear sightings data

on:
  schedule:
    # 20:00 UTC = 05:00 JST. GitHub cron uses UTC.
    - cron: "0 20 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build JSON from Sapporo CKAN
        run: |
          python Tools/convert_sapporo_bear_csv.py \
            --output public/bear_sightings.json \
            --metadata-output public/bear_sightings_metadata.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
